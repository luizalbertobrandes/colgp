<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aguarde - Aula em Breve</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4; /* Cor de fundo suave */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
        }

        .container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px; /* Mantém as bordas arredondadas da imagem */
            margin-bottom: 20px;
        }

        .container h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 30px;
        }

        .btn-voltar {
            display: inline-block;
            background-color: #007bff; /* Azul para o botão */
            color: #fff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .btn-voltar:hover {
            background-color: #0056b3; /* Cor mais escura no hover */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="imagem1.png" width="320" height="240" alt="O professor em sala de aula">
        <h1>Aguarde: em breve essa aula estará disponivel.</h1>
        <a href="index.html" class="btn-voltar">Voltar</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pessoas - EEB Colombo Machado Sales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <header class="gradient-bg text-white py-12 px-6 shadow-xl">
        <div class="max-w-5xl mx-auto">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">Gestão de Pessoas</h1>
            <p class="text-blue-100 text-lg">EEB Colombo Machado Sales | Curso de Administração</p>
            <div class="mt-6 p-4 bg-white/10 rounded-lg backdrop-blur-sm inline-block">
                <p class="font-semibold text-white">Professor: Luiz Alberto Brandes</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto py-12 px-6">
        <h2 class="text-2xl font-semibold mb-8 text-blue-900 border-l-4 border-blue-900 pl-4">Cronograma de Aulas</h2>
        
        <div id="aula-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            <!-- As aulas serão injetadas aqui via JavaScript -->
        </div>
    </main>

    <script>
        const iconList = [
            'book-open', 'users', 'briefcase', 'user-plus', 'clipboard-list', 'check-square', 
            'award', 'trending-up', 'target', 'bar-chart-2', 'shield', 'heart', 
            'calendar', 'clock', 'layout', 'graduation-cap', 'message-square', 'file-text',
            'git-merge', 'settings', 'search', 'user-check', 'coffee', 'monitor',
            'refresh-cw', 'smile', 'thumbs-up', 'key', 'layers', 'package'
        ];

        const grid = document.getElementById('aula-grid');

        for (let i = 1; i <= 30; i++) {
            const iconName = iconList[(i - 1) % iconList.length];
            const card = document.createElement('a');
            card.href = `aula${i}.html`;
            card.className = "flex flex-col items-center justify-center p-6 bg-white rounded-xl shadow-sm border border-gray-200 hover:shadow-lg hover:border-blue-500 transition-all duration-300 transform hover:-translate-y-1";
            
            card.innerHTML = `
                <i data-lucide="${iconName}" class="w-8 h-8 text-blue-700 mb-3"></i>
                <span class="font-semibold text-gray-700">Aula ${i}</span>
            `;
            grid.appendChild(card);
        }

        // Carregar ícones
        lucide.createIcons();
    </script>

    <footer class="py-8 text-center text-gray-500 text-sm">
        <p>© 2026 EEB Colombo Machado Sales - Gestão de Pessoas</p>
    </footer>
</body>
</html>
